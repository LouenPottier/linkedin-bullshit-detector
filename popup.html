<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Bullshit Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 300px;
      padding: 16px;
      background: #fff;
      color: #222;
    }
    h1 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .subtitle {
      font-size: 11px;
      color: #888;
      margin-bottom: 14px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .stat-card .val {
      font-size: 22px;
      font-weight: 700;
      color: #0a66c2;
    }
    .stat-card .lbl {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }
    .stat-card.warn .val { color: #f59e0b; }
    .stat-card.danger .val { color: #ef4444; }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    button {
      width: 100%;
      padding: 9px 12px;
      border-radius: 7px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .btn-export {
      background: #0a66c2;
      color: #fff;
    }
    .btn-clear {
      background: #fee2e2;
      color: #b91c1c;
    }
    .last-saved {
      font-size: 10.5px;
      color: #aaa;
      margin-top: 10px;
      text-align: center;
    }
    .empty {
      text-align: center;
      color: #aaa;
      font-size: 12px;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <h1>🧪 Bullshit Detector</h1>
  <p class="subtitle">Collecteur de données LinkedIn v0.1</p>

  <div id="main">
    <div class="empty" id="empty-state">Aucun post sauvegardé pour l'instant.</div>
    <div id="loaded-state" style="display:none">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="val" id="stat-total">0</div>
          <div class="lbl">Posts sauvegardés</div>
        </div>
        <div class="stat-card warn">
          <div class="val" id="stat-avg">—</div>
          <div class="lbl">Score moyen</div>
        </div>
        <div class="stat-card danger">
          <div class="val" id="stat-high">0</div>
          <div class="lbl">Score ≥ 7 (🔴)</div>
        </div>
        <div class="stat-card">
          <div class="val" id="stat-authors">0</div>
          <div class="lbl">Auteurs uniques</div>
        </div>
      </div>
      <div class="actions">
        <button class="btn-export" id="btn-export">⬇️ Exporter JSON</button>
        <button class="btn-clear" id="btn-clear">🗑️ Effacer les données</button>
      </div>
      <p class="last-saved" id="last-saved"></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
